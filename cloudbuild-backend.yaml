steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/backend:$COMMIT_SHA', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/backend:latest', '.']

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/backend:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/backend:latest']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'warroom-backend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--set-env-vars'
      - 'DATABASE_URL=u919113670_admin:Linc%40warroom.123@tcp(193.203.166.76:3306)/u919113670_warroom?parseTime=true&charset=utf8mb4,RUN_MIGRATIONS=true,ADMIN_EMAIL=admin@warroom.com,ADMIN_PASSWORD=admin123,ADMIN_NAME=Administrator,GEMINI_API_KEY=AIzaSyAHuldmyMIOJd7LT_SbjXR5DHie66nKURo,AI_MODEL=gemini-2.5-flash'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/backend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/warroom-repo/backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
